<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Simple Frontend</title>
		<script>
			async function fetchData() {
				try {
					const response = await fetch(
						"http://localhost:5001/api/data"
					);
					const data = await response.json();
					document.getElementById("api-data").innerText =
						data.message;
				} catch (error) {
					console.error("Error fetching data:", error);
				}
			}
		</script>
	</head>
	<body>
		<h1>Frontend Container</h1>
		<button onclick="fetchData()">Fetch Data from Node Backend</button>
		<p id="api-data"></p>
	</body>
</html>
